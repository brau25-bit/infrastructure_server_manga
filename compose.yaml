services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    ports:
      - :5432
    volumes: 
      - postgres_data:/var/lib/postgresql/data 
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 1m
      retries: 5
      start_period: 80s
  adminer:
    image: adminer
    restart: always
    ports: 
      - 8080:8080
volumes:
    postgres_data: